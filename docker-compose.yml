# docker-compose.yml

services:

  # ===== nginx: 玄関係 =====
  nginx:
    image: nginx:1.21.1
    ports:
      - "80:80"
    volumes:
      # nginx設定ファイル
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      # Laravelのソースコード（公開フォルダ用）
      - ./laravel:/var/www/
    depends_on:
      - php
      - next
    # 追加: コンテナ名で呼び合えるネットワーク
    networks:
      - jobmatch-network

  # ===== php: Laravel =====
  php:
    build: ./docker/php
    # 追加: コンテナ名を明示（他コンテナから「php」で呼べる）
    container_name: php
    volumes:
      - ./laravel:/var/www/
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/php.ini
    # 変更: パスワードを.envから読み込む（セキュリティ向上）
    env_file:
      - .env
    depends_on:
      - mysql
    networks:
      - jobmatch-network

  # ===== mysql: データ保管 =====
  mysql:
    image: mysql:8.0.26
    platform: linux/amd64
    container_name: mysql
    environment:
      # 変更: 直書きをやめて.envから読み込む
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      # 変更: DB名をjobmatch_dbに
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    command:
      - mysqld
      - --default-authentication-plugin=mysql_native_password
    volumes:
      - ./docker/mysql/data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf
    ports:
      - "3306:3306"
    networks:
      - jobmatch-network

  # ===== phpmyadmin: DB管理画面 =====
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    platform: linux/amd64
    environment:
      - PMA_ARBITRARY=1
      - PMA_HOST=mysql
      - PMA_USER=${DB_USERNAME}
      - PMA_PASSWORD=${DB_PASSWORD}
    depends_on:
      - mysql
    ports:
      - "8080:80"
    networks:
      - jobmatch-network

  # ===== next: Next.js フロントエンド =====
  next:
    build: ./docker/next
    container_name: next
    tty: true
    volumes:
      - ./frontend:/app
    working_dir: /app
    ports:
      - "3000:3000"
    command: sh -c "npm install && npm run dev"
    environment:
      - WATCHPACK_POLLING=true
      # 追加: LaravelのAPIのURLを環境変数で渡す
      - NEXT_PUBLIC_API_URL=http://localhost/api
    depends_on:
      - php
    networks:
      - jobmatch-network

  # ===== python: FastAPI AIマッチング =====
  python:
    build: ./docker/python
    container_name: python
    volumes:
      - ./python:/app
    ports:
      - "8001:8000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      - mysql
    networks:
      - jobmatch-network

# ネットワーク定義（コンテナ同士の内線回線）
networks:
  jobmatch-network:
    driver: bridge

